<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Product Rating</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assert/css/style.css">

</head>

<body>

<div class="container-fluid">

    <div class="container">

        <h1 class="page-title">
            <i class="fas fa-cog"></i> Settings
        </h1>

        <div class="settings-wrapper">

            <!-- Sidebar -->
            <div class="sidebar">
                <ul>
                    <li>Profile</li>
                    <li>Security</li>
                    <li>Address</li>
                    <li>Orders</li>
                    <li class="active">Rating</li>
                </ul>
            </div>

            <!-- Content -->
            <div class="content-area">

                <section class="section" id="orders">

                    <h3 class="section-title">
                        <i class="bi bi-star"></i> Product Ratings
                    </h3>

                    <!-- Product Card -->
                    <div class="shadow p-3 border rounded-3 mb-3">

                        <div class="d-flex flex-row justify-content-end">

                            <div class="text-success p-2 bg-success-subtle fw-bold rounded-2">
                                <i class="bi bi-archive"></i> SUCCESS
                            </div>

                        </div>

                        <hr>

                        <div class="d-flex align-items-center mb-3">

                            <div class="flex-shrink-0">
                                <img src="assert/img/products/p1.jpg" width="80" height="80" class="rounded">
                            </div>

                            <div class="flex-grow-1 px-3 position-relative">

                                <p class="mb-1 fw-semibold">Sample Product Name</p>

                                <div class="small text-muted">
                                    Quantity: 1
                                </div>

                                <div class="d-md-none mt-1">
                                    <span class="fw-bold">350,000 VNĐ</span>
                                </div>

                                <div class="d-none d-md-block position-absolute end-0 top-0 p-2">
                                    <span class="fw-bold">350,000 VNĐ</span>
                                </div>

                            </div>

                        </div>

                    </div>

                    <!-- Buttons -->

                    <div class="d-flex flex-column flex-md-row justify-content-end align-items-start align-items-md-center mb-2">

                        <a href="#" class="btn btn-info text-light mt-2 mt-md-0 me-2">
                            Buy Again
                        </a>

                        <button class="btn btn-warning text-light mt-2 mt-md-0" data-bs-toggle="modal" data-bs-target="#reviewModal">
                            <i class="bi bi-star"></i> Review
                        </button>

                    </div>

                    <!-- Modal Review -->

                    <div class="modal fade review-modal" id="reviewModal" tabindex="-1">

                        <div class="modal-dialog modal-dialog-centered">

                            <div class="modal-content">

                                <div class="modal-header">

                                    <h5 class="modal-title">
                                        Product Review
                                    </h5>

                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>

                                </div>

                                <div class="modal-body">

                                    <div class="text-center">

                                        <div class="rating mb-3">

                                            <i class="bi bi-star-fill" data-value="1"></i>
                                            <i class="bi bi-star-fill" data-value="2"></i>
                                            <i class="bi bi-star-fill" data-value="3"></i>
                                            <i class="bi bi-star-fill" data-value="4"></i>
                                            <i class="bi bi-star-fill" data-value="5"></i>

                                        </div>

                                        <p class="fw-semibold rating-text">
                                            Not rated yet
                                        </p>

                                    </div>

                                    <input type="hidden" class="rating-value" value="0">

                                </div>

                                <div class="modal-footer">

                                    <button class="btn btn-primary">
                                        Submit Review
                                    </button>

                                </div>

                            </div>

                        </div>

                    </div>

                </section>

            </div>
        </div>
    </div>
</div>

</body>
</html>
