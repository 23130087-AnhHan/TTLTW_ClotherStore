<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
<div class="container-fluid">
    <div class="container">
        <h1 class="page-title">
            <i class="fas fa-cog"></i> Settings
        </h1>

        <div class="settings-wrapper">
            <!-- Sidebar -->
            <div class="sidebar">
                <ul>
                    <li>Account</li>
                    <li>Password</li>
                    <li>Notifications</li>
                </ul>
            </div>

            <!-- Content -->
            <div class="content-area">
                <section class="section">
                    <h2 class="section-title">
                        <i class="fas fa-user-circle"></i> Account Information
                    </h2>

                    <form class="form-grid">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" value="username_example" disabled />
                        </div>

                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" value="example@email.com" disabled />
                        </div>

                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" placeholder="Enter first name" />
                        </div>

                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" placeholder="Enter last name" />
                        </div>

                        <div class="form-group">
                            <label>Birthday</label>
                            <input type="date" />
                        </div>

                        <div class="form-group">
                            <label>Gender</label>

                            <select>
                                <option>Select gender</option>
                                <option>Male</option>
                                <option>Female</option>
                                <option>Other</option>
                            </select>
                        </div>

                        <div class="form-group full-width mb-0">
                            <div class="text-center">
                                <span style="color: green">Update successful</span>
                            </div>
                        </div>

                        <div class="btn-group">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Update
                            </button>

                            <button type="reset" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Cancel
                            </button>
                        </div>
                    </form>
                </section>
            </div>
        </div>
    </div>
</div>

<script src="assets/javascript/script.js"></script>
</body>
</html>
