<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Settings - Address</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css" />

</head>

<body>

<div class="container">

    <h1 class="page-title">
        <i class="fas fa-cog"></i> Settings
    </h1>

    <div class="settings-wrapper">

        <!-- Sidebar -->
        <div class="sidebar">
            <ul>
                <li>Profile</li>
                <li>Security</li>
                <li class="active">Address</li>
                <li>Orders</li>
            </ul>
        </div>

        <!-- Content -->
        <div class="content-area">

            <section class="section" id="address">

                <h2 class="section-title">
                    <i class="fas fa-map-marker-alt"></i> Address
                </h2>

                <form class="form-grid">

                    <div class="form-group full-width">
                        <label>Address</label>
                        <input type="text" placeholder="Enter your address">
                    </div>

                    <div class="form-group">
                        <label>Ward</label>
                        <input type="text" placeholder="Enter ward">
                    </div>

                    <div class="form-group">
                        <label>City</label>
                        <select>

                            <option value="">Select city</option>
                            <option>Hà Nội</option>
                            <option>TP Hồ Chí Minh</option>
                            <option>Đà Nẵng</option>
                            <option>Hải Phòng</option>
                            <option>Cần Thơ</option>
                            <option>Bình Dương</option>
                            <option>Đồng Nai</option>
                            <option>Nghệ An</option>
                            <option>Thanh Hóa</option>
                            <option>Quảng Ninh</option>
                            <option>Khánh Hòa</option>
                            <option>Lâm Đồng</option>
                            <option>Bà Rịa - Vũng Tàu</option>
                            <option>Bắc Ninh</option>
                            <option>Thừa Thiên Huế</option>

                        </select>
                    </div>

                    <div class="form-group">
                        <label>Country</label>
                        <select>

                            <option>Việt Nam</option>
                            <option>China</option>
                            <option>Taiwan</option>
                            <option>Korea</option>

                        </select>
                    </div>

                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" placeholder="Enter phone">
                    </div>

                </form>

                <!-- Address List -->
                <div class="list-display-address">

                    <div class="location-display position-relative mt-3">

                        <i class="fas fa-map-marker-alt"></i>

                        <div>

                            <strong>Current Location</strong>

                            <p>123 Nguyễn Huệ, Bến Nghé, Hồ Chí Minh, Việt Nam</p>

                            <p style="color:#666;">Phone: 0123456789</p>

                        </div>

                        <div class="position-absolute top-50 end-0 translate-middle-y me-3">

                            <button class="border-0 bg-transparent">
                                <i class="bi bi-check-lg"></i>
                            </button>

                            <button class="ms-2 border-0 bg-transparent">
                                <i class="bi bi-trash text-danger"></i>
                            </button>

                        </div>

                    </div>

                </div>

                <div class="btn-group mt-3">

                    <button class="btn btn-primary">
                        <i class="fas fa-save"></i> Update
                    </button>

                    <button class="btn btn-secondary">
                        <i class="fas fa-times"></i> Cancel
                    </button>
                </div>

            </section>

        </div>

    </div>
</div>

</body>
</html>
